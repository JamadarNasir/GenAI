version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '4000:4000'
    env_file:
      - .env
    volumes:
      - ./automation:/app/automation
    depends_on: []
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped
